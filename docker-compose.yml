version: '3.8'

services:
  mediadownloader:
    build: .
    container_name: mediadownloader-webui
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      # 左边是你宿主机（NAS）的路径，右边是容器内的路径。修改左边的 ./downloads 为你想要的 NAS 存储路径。
      - ./downloads:/downloads
    environment:
      - DOWNLOAD_DIR=/downloads
      - TZ=Asia/Shanghai
